<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  background:
    linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
    url('https://images.pexels.com/photos/358070/pexels-photo-358070.jpeg')
    no-repeat center center fixed;
  background-size: cover;
  color: #e0e0e0;
  font-family: 'Roboto', sans-serif;
  margin: 0;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #ffb300;
}

form {
  max-width: 1000px;
  margin: auto;
  background: rgba(30,30,30,0.9);
  padding: 20px;
  border-radius: 10px;

  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

input, textarea {
  padding: 10px;
  border-radius: 6px;
  border: 1px solid rgba(255,179,0,0.4);
  background: rgba(15,23,42,0.9);
  color: white;
}

textarea {
  grid-column: span 2;
  height: 120px;
}

button {
  grid-column: span 2;
  padding: 12px;
  background: #ffb300;
  color: black;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #ffcc33;
}

/* IMAGE */
#dropArea {
  grid-column: span 2;
  border: 2px dashed rgba(255,179,0,0.4);
  padding: 10px;
  text-align: center;
  cursor: pointer;
}

#preview {
  grid-column: span 2;
  display: flex;
  flex-wrap: wrap;
}

#preview div {
  position: relative;
  margin: 5px;
}

#preview img {
  width: 80px;
  border-radius: 6px;
}

#preview button {
  position: absolute;
  top: -5px;
  right: -5px;
  background: red;
  color: white;
  border: none;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 10px;
  cursor: pointer;
}

/* VARIANTS */
.variant-box {
  background: rgba(15,23,42,0.8);
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.remove-variant {
  grid-column: span 2;
  background: red;
}

/* LIST */
#carsList {
  max-width: 1000px;
  margin: 40px auto;
}

.car-item {
  background: rgba(30,30,30,0.9);
  padding: 14px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  border-radius: 10px;
}

.edit-btn {
  background: #2563eb;
  color: white;
}

.delete-btn {
  background: #dc2626;
  color: white;
}
</style>
</head>

<body>

<h1>🚗 AutoVerse Admin Panel</h1>

<form id="form">

<input name="brand" placeholder="Brand">
<input name="model" placeholder="Model">
<input name="type" placeholder="Type">
<input name="priceRange" placeholder="Price Range">

<input name="engineOptions" placeholder="Engine Options">
<input name="fuelType" placeholder="Fuel Type">
<input name="transmission" placeholder="Transmission">

<input name="mileage" placeholder="Mileage">
<input name="seatingCapacity" placeholder="Seats">
<input name="rating" placeholder="Rating">
<input name="ncapRating" placeholder="NCAP">

<input name="bestFor" placeholder="Best For">

<textarea name="description" placeholder="Description"></textarea>
<textarea name="features" placeholder="Features"></textarea>
<textarea name="pros" placeholder="Pros"></textarea>
<textarea name="cons" placeholder="Cons"></textarea>
<textarea name="verdict" placeholder="Verdict"></textarea>

<!-- IMAGE -->
<div id="dropArea">📂 Upload Images</div>
<input type="file" id="imageInput" multiple hidden>
<div id="preview"></div>

<!-- VARIANTS -->
<div style="grid-column: span 2;">
<h3 style="color:#ffb300;">Variants</h3>
<div id="variantContainer"></div>
<button type="button" onclick="addVariant()">+ Add Variant</button>
</div>

<button type="submit">Save</button>

</form>

<div id="carsList"></div>

<script src="backend/admin.js"></script>

</body>
</html>
