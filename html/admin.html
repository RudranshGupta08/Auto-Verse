<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AutoVerse Admin Pro</title>

<style>
/* 🔥 GLOBAL */
body {
  background: #0f172a;
  color: white;
  font-family: "Segoe UI", sans-serif;
  margin: 0;
  padding: 20px;
}

/* 🔥 HEADER */
h1 {
  text-align: center;
  color: orange;
  margin-bottom: 20px;
}

/* 🔥 FORM CONTAINER */
form {
  max-width: 800px;
  margin: auto;
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* 🔥 FULL WIDTH ITEMS */
.full {
  grid-column: span 2;
}

/* 🔥 INPUTS */
input, select {
  padding: 12px;
  border: none;
  border-radius: 6px;
  outline: none;
  background: #334155;
  color: white;
  font-size: 14px;
}

input::placeholder {
  color: #cbd5f5;
}

/* 🔥 BUTTON */
button {
  grid-column: span 2;
  background: orange;
  color: black;
  padding: 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  background: #ffb84d;
}

/* 🔥 DRAG AREA */
#dropArea {
  grid-column: span 2;
  border: 2px dashed orange;
  padding: 30px;
  text-align: center;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
  background: #020617;
}

#dropArea:hover {
  background: #1e293b;
}

/* 🔥 PREVIEW */
.preview {
  grid-column: span 2;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.preview img {
  width: 90px;
  height: 70px;
  object-fit: cover;
  border-radius: 6px;
  border: 2px solid #334155;
  transition: 0.3s;
}

.preview img:hover {
  transform: scale(1.1);
  border-color: orange;
}

/* 🔥 RESPONSIVE */
@media (max-width: 600px) {
  form {
    grid-template-columns: 1fr;
  }

  .full {
    grid-column: span 1;
  }

  button {
    grid-column: span 1;
  }
}
</style>
</head>

<body>

<h1>🚗 AutoVerse Admin Pro</h1>

<form id="carForm">

  <input name="brand" placeholder="Brand" required>
  <input name="model" placeholder="Model" required>

  <select name="type">
    <option>SUV</option>
    <option>Sedan</option>
    <option>Hatchback</option>
    <option>MUV</option>
  </select>

  <input name="priceRange" placeholder="Price Range">
  <input name="engineOptions" placeholder="Engine (comma separated)">
  <input name="mileage" placeholder="Mileage">

  <input name="fuelType" placeholder="Fuel Type (comma separated)">
  <input name="transmission" placeholder="Transmission (comma separated)">

  <input name="seatingCapacity" placeholder="Seating Capacity" class="full">

  <!-- 🔥 DRAG & DROP -->
  <div id="dropArea" class="full">
    📂 Drag & Drop Images Here <br> or Click to Upload
    <input type="file" id="imageInput" multiple hidden>
  </div>

  <!-- 🔥 IMAGE PREVIEW -->
  <div class="preview" id="preview"></div>

  <button type="submit">🚀 Add Car</button>

</form>

<script src="backend/admin.js"></script>

</body>
</html>
