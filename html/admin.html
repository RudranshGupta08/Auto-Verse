<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>

 <style>
  body {
    background: #0f172a;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: orange;
  }

  form {
    max-width: 1000px;
    margin: auto;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  input,
  textarea {
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #334155;
    color: white;
  }

  textarea {
    grid-column: span 2;
    height: 120px;
  }

  button {
    grid-column: span 2;
    padding: 12px;
    background: orange;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
  }

  button:hover {
    background: #ffb300;
    transform: scale(1.02);
  }

  #carsList {
    max-width: 1000px;
    margin: 40px auto;
  }

  .car-item {
    background: #1e293b;
    padding: 14px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 10px;
    transition: 0.3s;
  }

  .car-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  }

  /* 🔥 BUTTON CONTAINER */
  .car-item div {
    display: flex;
    gap: 10px;
  }

  /* ✏️ EDIT BUTTON */
  .edit-btn {
    background: linear-gradient(135deg, #2563eb, #60a5fa);
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
  }

  .edit-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 10px rgba(96,165,250,0.7);
  }

  .edit-btn:active {
    transform: scale(0.95);
  }

  /* ❌ DELETE BUTTON */
  .delete-btn {
    background: linear-gradient(135deg, #dc2626, #ef4444);
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
  }

  .delete-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 10px rgba(239,68,68,0.7);
  }

  .delete-btn:active {
    transform: scale(0.95);
  }

  /* 🔥 IMAGE PREVIEW */
  #preview img {
    width: 80px;
    margin: 5px;
    border-radius: 6px;
  }

  #dropArea {
    border: 2px dashed #334155;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    grid-column: span 2;
    transition: 0.3s;
  }

  #dropArea:hover {
    background: #1e293b;
  }
</style>
</head>

<body>

<h1>🚗 Admin Panel</h1>

<form id="form">
  <input name="brand" placeholder="Brand" required>
  <input name="model" placeholder="Model" required>
  <input name="type" placeholder="Type">
  <input name="priceRange" placeholder="Price">

  <input name="engineOptions" placeholder="Engine (comma separated)">
  <input name="fuelType" placeholder="Fuel (comma separated)">
  <input name="transmission" placeholder="Transmission">

  <input name="mileage" placeholder="Mileage">
  <input name="seatingCapacity" placeholder="Seats">
  <input name="rating" placeholder="Rating">
  <input name="ncapRating" placeholder="NCAP">

  <input name="bestFor" placeholder="Best For (comma separated)">

  <textarea name="description" placeholder="Description"></textarea>
  <textarea name="features" placeholder="Features"></textarea>
  <textarea name="pros" placeholder="Pros"></textarea>
  <textarea name="cons" placeholder="Cons"></textarea>
  <textarea name="verdict" placeholder="Verdict"></textarea>

  <button type="submit">Save</button>
</form>

<div id="carsList"></div>

<!-- 🔥 IMPORTANT -->
<script src="backend/admin.js"></script>

</body>
</html>
